<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINLINT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #222222;
      --border-hi: #333333;
      --text:      #e0e0e0;
      --muted:     #666666;
      --green:     #00ff88;
      --green-dim: #00cc6a;
      --red:       #ff4444;
      --amber:     #ffaa00;
      --blue:      #4488ff;
      --purple:    #aa66ff;
      --teal:      #00ccaa;
      --orange:    #ff8844;
      --yellow:    #ffdd44;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .brand { display: flex; align-items: baseline; gap: 12px; }
    .brand-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 4px;
    }
    .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

    /* ── MODE TOGGLE ── */
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .toggle {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border-hi);
      border-radius: 20px;
      padding: 3px;
      gap: 2px;
    }
    .toggle button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 5px 14px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .toggle button.active {
      background: var(--green);
      color: #000;
      font-weight: 700;
    }

    /* ── MAIN LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 57px - 36px);
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }
    .panel-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--surface);
    }
    .editor-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    .line-numbers {
      width: 48px;
      padding: 14px 0;
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: var(--border-hi);
      background: var(--surface);
      border-right: 1px solid var(--border);
      user-select: none;
      overflow: hidden;
    }
    .line-numbers span { display: block; padding-right: 10px; }
    textarea#code {
      flex: 1;
      padding: 14px 16px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      border: none;
      outline: none;
      resize: none;
      tab-size: 4;
      white-space: pre;
      overflow-wrap: normal;
      overflow-x: auto;
    }
    textarea#code::placeholder { color: #333; }
    .analyze-btn {
      margin: 12px 16px;
      padding: 12px;
      background: var(--green);
      color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s, transform 0.1s;
    }
    .analyze-btn:hover { background: var(--green-dim); }
    .analyze-btn:active { transform: scale(0.99); }
    .analyze-btn:disabled { background: #1a3d2e; color: #2a7a55; cursor: not-allowed; }

    /* ── RIGHT PANEL ── */
    .panel-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .results-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .results-body::-webkit-scrollbar { width: 4px; }
    .results-body::-webkit-scrollbar-track { background: transparent; }
    .results-body::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* ── IDLE / LOADING / CLEAN ── */
    .state-idle, .state-loading, .state-clean {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .state-idle .icon, .state-loading .icon, .state-clean .icon {
      font-size: 32px;
      opacity: 0.4;
    }
    .state-clean .icon { color: var(--green); opacity: 1; font-size: 40px; }
    .state-clean .clean-text { color: var(--green); font-size: 14px; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0 } }

    /* ── ISSUE CARDS ── */
    .issue-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
      opacity: 0;
      transform: translateY(8px);
      animation: cardIn 0.25s ease forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 1px;
    }
    .badge-sev-CRITICAL { background: #3a0a0a; color: var(--red); border: 1px solid #5a1010; }
    .badge-sev-HIGH     { background: #2e1a00; color: var(--amber); border: 1px solid #4a2e00; }
    .badge-sev-MEDIUM   { background: #0a1a3a; color: var(--blue); border: 1px solid #1a3060; }
    .badge-sev-LOW      { background: #1a1a1a; color: var(--muted); border: 1px solid var(--border-hi); }

    .badge-cat-TEMPORAL   { background: #1e0a3a; color: var(--purple); border: 1px solid #3a1a5a; }
    .badge-cat-DATA       { background: #0a2a28; color: var(--teal); border: 1px solid #1a4a44; }
    .badge-cat-PANDAS     { background: #2e1a0a; color: var(--orange); border: 1px solid #4a2e10; }
    .badge-cat-EXECUTION  { background: #2e0a0a; color: var(--red); border: 1px solid #5a1010; }
    .badge-cat-LOGIC      { background: #2a2000; color: var(--yellow); border: 1px solid #4a3800; }
    .badge-cat-STATISTICAL{ background: #0a1a3a; color: var(--blue); border: 1px solid #1a3060; }

    .issue-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .issue-description {
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .issue-section { margin-bottom: 8px; }
    .issue-section-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .issue-section-body {
      font-size: 12px;
      color: #bbb;
      line-height: 1.5;
    }
    .issue-fix {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--green);
      background: #0a1f14;
      border: 1px solid #1a3d28;
      border-radius: 4px;
      padding: 8px 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .line-ref {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── STATUS BAR ── */
    footer {
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .status-val { color: var(--text); }
    .status-sep { color: var(--border-hi); }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-name">FINLINT</span>
    <span class="brand-sub">quant finance code reviewer</span>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label">mode</span>
    <div class="toggle">
      <button id="btn-full" class="active" onclick="setMode('full')">full analysis</button>
      <button id="btn-baseline" onclick="setMode('baseline')">baseline</button>
    </div>
  </div>
</header>

<main>
  <!-- LEFT: CODE INPUT -->
  <div class="panel-left">
    <div class="panel-header">// input</div>
    <div class="editor-wrap">
      <div class="line-numbers" id="line-numbers"></div>
      <textarea id="code" spellcheck="false" placeholder="# paste your Python quantitative finance code here..."></textarea>
    </div>
    <button class="analyze-btn" id="analyze-btn" onclick="analyze()">analyze</button>
  </div>

  <!-- RIGHT: RESULTS -->
  <div class="panel-right">
    <div class="panel-header">// results</div>
    <div class="results-body" id="results">
      <div class="state-idle">
        <div class="icon">▸</div>
        <div>paste code and run analysis</div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="status-item">
    <span class="status-dot active" id="status-dot"></span>
    <span>mode</span>
    <span class="status-val" id="status-mode">full analysis</span>
  </div>
  <span class="status-sep">|</span>
  <div class="status-item">
    <span>model</span>
    <span class="status-val" id="status-model">claude-haiku-4-5-20251001</span>
  </div>
  <span class="status-sep">|</span>
  <div class="status-item">
    <span>time</span>
    <span class="status-val" id="status-time">—</span>
  </div>
</footer>

<script>
  let currentMode = 'full';

  // ── LINE NUMBERS ──
  const textarea = document.getElementById('code');
  const lineNumbers = document.getElementById('line-numbers');

  function updateLineNumbers() {
    const lines = textarea.value.split('\n').length;
    let html = '';
    for (let i = 1; i <= Math.max(lines, 20); i++) {
      html += `<span>${i}</span>`;
    }
    lineNumbers.innerHTML = html;
  }

  textarea.addEventListener('input', updateLineNumbers);
  textarea.addEventListener('scroll', () => {
    lineNumbers.scrollTop = textarea.scrollTop;
  });
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = textarea.selectionStart, end = textarea.selectionEnd;
      textarea.value = textarea.value.substring(0, s) + '    ' + textarea.value.substring(end);
      textarea.selectionStart = textarea.selectionEnd = s + 4;
      updateLineNumbers();
    }
  });
  updateLineNumbers();

  // ── MODE TOGGLE ──
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btn-full').classList.toggle('active', mode === 'full');
    document.getElementById('btn-baseline').classList.toggle('active', mode === 'baseline');
    document.getElementById('status-mode').textContent = mode === 'full' ? 'full analysis' : 'baseline';
  }

  // ── ANALYZE ──
  async function analyze() {
    const code = textarea.value.trim();
    if (!code) return;

    const btn = document.getElementById('analyze-btn');
    const results = document.getElementById('results');

    btn.disabled = true;
    btn.textContent = 'scanning...';
    document.getElementById('status-dot').classList.remove('active');
    document.getElementById('status-time').textContent = '—';

    results.innerHTML = `
      <div class="state-loading">
        <div class="icon">◈</div>
        <div>scanning<span class="blink">_</span></div>
      </div>`;

    try {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, mode: currentMode }),
      });

      const data = await res.json();

      if (data.error) {
        results.innerHTML = `<div class="state-loading" style="color:#ff4444">
          <div class="icon" style="color:#ff4444">✗</div>
          <div>${escHtml(data.error)}</div>
        </div>`;
        return;
      }

      document.getElementById('status-time').textContent = data.elapsed_ms + 'ms';
      document.getElementById('status-model').textContent = data.model || '—';
      document.getElementById('status-dot').classList.add('active');

      renderResults(data.result);

    } catch (err) {
      results.innerHTML = `<div class="state-loading" style="color:#ff4444">
        <div class="icon" style="color:#ff4444">✗</div>
        <div>network error</div>
      </div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'analyze';
    }
  }

  function renderResults(result) {
    const results = document.getElementById('results');
    const issues = result?.issues || [];

    if (issues.length === 0) {
      results.innerHTML = `
        <div class="state-clean">
          <div class="icon">✓</div>
          <div class="clean-text">no issues detected</div>
        </div>`;
      return;
    }

    let html = '';
    issues.forEach((issue, i) => {
      const sev = (issue.severity || 'LOW').toUpperCase();
      const cat = (issue.category || '').toUpperCase();
      const delay = i * 60;

      html += `<div class="issue-card" style="animation-delay:${delay}ms">
        <div class="card-top">
          <span class="badge badge-sev-${sev}">${sev}</span>
          ${cat ? `<span class="badge badge-cat-${cat}">${cat}</span>` : ''}
          ${issue.line ? `<span class="line-ref">line ${issue.line}</span>` : ''}
        </div>
        <div class="issue-title">${escHtml(issue.title || '')}</div>
        ${issue.description ? `<div class="issue-description">${escHtml(issue.description)}</div>` : ''}
        ${issue.why_it_matters ? `
          <div class="issue-section">
            <div class="issue-section-label">⚠ why it matters</div>
            <div class="issue-section-body">${escHtml(issue.why_it_matters)}</div>
          </div>` : ''}
        ${issue.suggested_fix ? `
          <div class="issue-section">
            <div class="issue-section-label">→ suggested fix</div>
            <div class="issue-fix">${escHtml(issue.suggested_fix)}</div>
          </div>` : ''}
      </div>`;
    });

    results.innerHTML = html;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── KEYBOARD SHORTCUT ──
  textarea.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      analyze();
    }
  });
</script>

</body>
</html>
